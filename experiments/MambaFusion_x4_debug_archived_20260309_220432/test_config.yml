# GENERATE TIME: Mon Mar  9 22:01:40 2026
# CMD:
# train.py -opt test_config.yml

name: MambaFusion_x4_debug
model_type: MambaFusionModel
scale: 8
num_gpu: 1
manual_seed: 42

datasets:
  train:
    name: RealBSR_train
    type: BurstImageDataset
    dataroot: /home/blozanod/projects/MambaFusion/dataset/RealBSR_RAW_trainpatch
    num_frames: 3
    phase: train
    scale: 8
    batch_size_per_gpu: 1
    num_worker_per_gpu: 0
    dataset_enlarge_ratio: 1

  val:
    name: RealBSR_val
    type: BurstImageDataset
    dataroot: /home/blozanod/projects/MambaFusion/dataset/RealBSR_RAW_testpatch
    num_frames: 3
    phase: val
    scale: 8

network_g:
  type: MambaFusionNet
  num_frames: 3
  num_feat: 16
  offset_groups: 4
  scale: 4
  depths: [2, 2]
  num_heads: [2, 2]
  embed_dim: 16
  mlp_ratio: 1
  upsampler: pixelshuffledirect

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 10
  warmup_iter: -1

  optim_g:
    type: AdamW
    lr: !!float 2e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [10]
    restart_weights: [1]
    eta_min: !!float 1e-7

  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: 5
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false

logger:
  print_freq: 1
  save_checkpoint_freq: 10
  use_tb_logger: false