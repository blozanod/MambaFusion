# config.yml
name: MambaFusion_x4_NewBurstAlign_GW
model_type: MambaFusionModel
scale: 8
num_gpu: 4
manual_seed: 42
find_unused_parameters: false

# Dataset
datasets:
  train:
    name: RealBSR_train
    type: BurstImageDataset
    dataroot: /groups/rls/blozanod/MambaFusion/dataset/RealBSR_RAW_trainpatch
    num_frames: 5
    phase: train
    scale: 8
    batch_size_per_gpu: 2
    num_worker_per_gpu: 6
    dataset_enlarge_ratio: 1
    grad_clip_norm: 1

  val:
    name: RealBSR_val
    type: BurstImageDataset
    dataroot: /groups/rls/blozanod/MambaFusion/dataset/RealBSR_RAW_testpatch
    num_frames: 5
    phase: val
    scale: 8

# Network
network_g:
  type: MambaFusionNet
  num_frames: 5
  img_size: 80
  num_feat: 64
  offset_groups: 4
  fusion_heads: 4
  embed_dim: 174
  d_state: 16
  scale: 8
  depths: [6, 6, 6, 6, 6, 6]
  num_heads: [6, 6, 6, 6, 6, 6]
  window_size: 16
  inner_rank: 64
  num_tokens: 128
  convffn_kernel_size: 5
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'
  is_train: true

# Training
path:
  pretrain_network_g: /groups/rls/blozanod/MambaFusion/experiments/MambaFusion_x4_NewBurstAlign/models/net_g_35000.pth
  strict_load_g: true
  resume_state: ~
  experiments_root: ~

train:
  total_iter: 100000
  warmup_iter: 7500

  optim_g:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]


  scheduler:
    type: MultiStepLR
    milestones: [125000, 200000, 250000, 275000]
    gamma: 0.5

  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean
  edge_opt:
    type: GWLoss
    loss_weight: 0.09

# Validation
val:
  val_freq: 5000
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false

# Logging
logger:
  print_freq: 100
  save_checkpoint_freq: 5000
  use_tb_logger: false
