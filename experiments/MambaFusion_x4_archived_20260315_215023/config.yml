# CMD:
# train.py -opt config.yml --launcher pytorch

# config.yml
name: MambaFusion_x4
model_type: MambaFusionModel
scale: 8
num_gpu: 4
manual_seed: 42

# Dataset
datasets:
  train:
    name: RealBSR_train
    type: BurstImageDataset
    dataroot: /groups/rls/blozanod/MambaFusion/dataset/RealBSR_RAW_trainpatch
    num_frames: 5
    phase: train
    scale: 8
    batch_size_per_gpu: 2
    num_worker_per_gpu: 4
    dataset_enlarge_ratio: 1
    grad_clip_norm: 1

  val:
    name: RealBSR_val
    type: BurstImageDataset
    dataroot: /groups/rls/blozanod/MambaFusion/dataset/RealBSR_RAW_testpatch
    num_frames: 5
    phase: val
    scale: 8

# Network
network_g:
  type: MambaFusionNet
  num_frames: 5
  num_feat: 64
  offset_groups: 8
  embed_dim: 174
  d_state: 16
  scale: 8
  depths: [6, 6, 6, 6, 6, 6]
  num_heads: [6, 6, 6, 6, 6, 6]
  window_size: 16
  inner_rank: 64
  num_tokens: 128
  convffn_kernel_size: 5
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# Training
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~
  experiments_root: ~

train:
  total_iter: 300000
  warmup_iter: 5000

  optim_g:
    type: AdamW
    lr: !!float 5e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.99]
    eps: !!float 1e-6


  scheduler:
    type: CosineAnnealingRestartLR
    periods: [50000, 150000, 250000]
    restart_weights: [1, 0.5, 0.25]
    eta_min: !!float 1e-7

  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 20.0
    reduction: mean
  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      relu3_4: 0.25
      relu4_4: 0.25
      relu5_4: 0.5
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: 0.50
    style_weight: 0.0
    criterion: l1
  sobel_opt:
    type: SobelLoss
    loss_weight: 1.0

# Validation
val:
  val_freq: 5000
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false

# Logging
logger:
  print_freq: 100
  save_checkpoint_freq: 5000
  use_tb_logger: false
